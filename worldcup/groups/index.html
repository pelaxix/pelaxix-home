        document.documentElement.classList.add("standalone-app");
      }

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet" />

  </head>
  <body>
    <div class="app-shell">
      <header class="site-header">
        <a class="logo" href="/" aria-label="Pelaxix home">
          <span class="logo-mark">P</span>
          <span>Pelaxix</span>
        </a>
      </header>

      <main>
        <section class="hero compact-title groups-hero">

            <a href="/worldcup/">Schedule</a>
            <a class="active" href="/worldcup/groups/">Groups</a>

              <option value="Jordan">🇯🇴 Jordan</option>
              <option value="Mexico">🇲🇽 Mexico</option>
              <option value="Morocco">🇲🇦 Morocco</option>
              <option value="Netherlands">🇳🇱 Netherlands</option>
              <option value="New Zealand">🇳🇿 New Zealand</option>
              <option value="Norway">🇳🇴 Norway</option>
              <option value="Panama">🇵🇦 Panama</option>
              <option value="Paraguay">🇵🇾 Paraguay</option>

              <option value="Spain">🇪🇸 Spain</option>

              <option value="Türkiye">🇹🇷 Türkiye</option>

        <p id="groupsEmptyState" class="empty-state" hidden>Could not load group standings.</p>
      </main>
    </div>

    <script src="groups.js?v=4"></script>
  </body>
</html>
