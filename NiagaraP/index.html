<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="A Niagara Parks parking locator map for parking lots and boat launches with quick Google Maps directions." />
    <meta name="theme-color" content="#007965" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="NP Parking" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Niagara Parks Parking Locator" />
    <meta property="og:description" content="Find nearby Niagara Parks parking lots and boat launches, then open Google Maps directions fast." />
    <meta property="og:image" content="https://pelaxix.com/NiagaraP/parkpass-social-preview.png" />
    <meta property="og:image:secure_url" content="https://pelaxix.com/NiagaraP/parkpass-social-preview.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://pelaxix.com/NiagaraP/" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Niagara Parks Parking Locator" />
    <meta name="twitter:description" content="Find nearby Niagara Parks parking lots and boat launches, then open Google Maps directions fast." />
    <meta name="twitter:image" content="https://pelaxix.com/NiagaraP/parkpass-social-preview.png" />

    <title>Niagara Parks Parking Locator</title>
    <link rel="icon" href="/NiagaraP/parkpass-touch-icon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/NiagaraP/parkpass-touch-icon.png" />
    <script>
      if (window.navigator.standalone === true || window.matchMedia("(display-mode: standalone)").matches) {
        document.documentElement.classList.add("standalone-app");
      }

      document.addEventListener("gesturestart", (event) => event.preventDefault(), { passive: false });
      document.addEventListener("gesturechange", (event) => event.preventDefault(), { passive: false });
      document.addEventListener("gestureend", (event) => event.preventDefault(), { passive: false });

      let lastTouchEnd = 0;
      document.addEventListener("touchend", (event) => {
        const now = Date.now();
        if (now - lastTouchEnd <= 300) event.preventDefault();
        lastTouchEnd = now;
      }, { passive: false });
    </script>
    <style>
      html,
      body {
        max-width: 100%;
        overflow-x: hidden;
        overscroll-behavior-x: none;
        touch-action: manipulation;
      }

      @media all and (display-mode: standalone) {
        .site-header {
          display: none;
        }

        .page-shell {
          padding-top: 12px;
        }
      }

      .standalone-app .site-header {
        display: none;
      }

      .standalone-app .page-shell {
        padding-top: 12px;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="niagara.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <a class="logo" href="/" aria-label="Pelaxix home">
          <span class="logo-mark">P</span>
          <span>Pelaxix</span>
        </a>
      </header>

      <main>
        <section class="hero">
          <div class="hero-mark" aria-hidden="true">
            <span class="petal petal-green"></span>
            <span class="petal petal-blue"></span>
            <span class="petal petal-yellow"></span>
            <span class="petal petal-orange"></span>
            <span class="petal petal-red"></span>
          </div>
          <div class="hero-copy-block">
            <p class="eyebrow">Niagara Parks</p>
            <h1>Parking pass locations</h1>
            <p class="hero-copy">Find nearby parking lots and boat launches, then open Google Maps directions.</p>
          </div>
        </section>

        <section class="map-panel" aria-label="Niagara Parks parking and boat launches map">
          <div class="toolbar" aria-label="Map filters">
            <button class="filter-button active" type="button" data-filter="all">All</button>
            <button class="filter-button" type="button" data-filter="parking">Parking</button>
            <button class="filter-button" type="button" data-filter="boat-launch">Boat launches</button>
          </div>

          <div class="map-shell">
            <div id="map" class="map" aria-label="Map of Niagara Parks parking lots and boat launches"></div>
          </div>

          <section class="locations-panel" aria-live="polite">
            <div class="locations-heading">
              <div>
                <p id="cards-kicker" class="card-kicker">All locations</p>
                <h2 id="cards-title">Parking lots and boat launches</h2>
              </div>
              <button id="show-all-button" class="show-all-button" type="button">Show all</button>
            </div>
            <div id="location-cards" class="location-cards"></div>
          </section>
        </section>
      </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="locations.js"></script>
    <script src="niagara.js"></script>
  </body>
</html>
