<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Yucafantasy muestra posters de F1 y el contador de cierre para cada Gran Premio." />
    <title>Yucafantasy | Pelaxix</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="yucafantasy.css" />
    <link rel="stylesheet" href="/project-nav.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="site-header">
        <a class="logo" href="/" aria-label="Inicio de Pelaxix"><span class="logo-mark">P</span><span>Pelaxix</span></a>
      </header>

      <main>
        <section class="hero">
          <p class="eyebrow">Cierre Fantasy</p>
          <h1>Yucafantasy</h1>
        </section>

        <section class="gp-card" aria-live="polite">
          <div class="control-card">
            <div class="selector-wrap">
              <label for="gpSelect">Gran Premio</label>
              <select id="gpSelect"></select>
            </div>

            <div class="deadline-card" id="deadlineCard">
              <p id="deadlineType" class="deadline-type">Cierre</p>
              <div id="countdown" class="countdown">Cargando...</div>
              <p id="deadlineMeta" class="deadline-meta"></p>
            </div>
          </div>

          <div class="poster-frame">
            <img id="gpPoster" alt="Poster del Gran Premio seleccionado" />
          </div>

          <section class="podium-card" aria-label="Projected GP Podium">
            <p class="podium-title">Proyected GP Podium</p>
            <div class="podium-list">
              <span>🥇 1. Sergio Pérez</span>
              <span>🥈 2. Fernando Alonso</span>
              <span>🥉 3. Franco Colapinto</span>
            </div>
          </section>
        </section>
      </main>
    </div>

    <script src="yucafantasy.js"></script>
  </body>
</html>
